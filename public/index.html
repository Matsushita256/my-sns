<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAN SNS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <h1 class="app-logo">LAN SNS</h1>
            
            <div id="search-area" class="card">
            <h3>投稿を検索</h3>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="キーワードを入力...">
                    <button onclick="performSearch()" class="btn-primary">検索</button>
                </div>
            </div>

            <div id="login-area" class="card">
                <h3>ログイン / 登録</h3>
                <input type="text" id="login-username" placeholder="ユーザー名">
                <input type="password" id="login-password" placeholder="パスワード">
                <div class="auth-buttons">
                    <button onclick="login()" class="btn-primary">ログイン</button>
                    <button onclick="register()" class="btn-secondary">新規登録</button>
                </div>
            </div>

            <div id="status-area" class="card">
                <p class="status-text">
                    <span class="dot"></span>
                    <span id="display-username">未ログイン</span>
                </p>
            </div>
        </aside>

        <main class="main-content">
            <div id="post-area" class="card post-card">
                <textarea id="content" placeholder="いまどうしてる？"></textarea>
                <div class="post-footer">
                    <button onclick="submitPost()" class="btn-post">投稿する</button>
                </div>
            </div>

            <div id="timeline">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
